# backend/nginx/nginx.conf

events {}

http {
  # ✅ 허용할 Origin만 화이트리스트로
  map $http_origin $cors_origin {
    default "";
    "http://localhost:3000" $http_origin;
  }

  upstream profile_upstream { server profile-service:3001; }
  upstream echo_upstream    { server echo-service:3002; }

  server {
    listen 80;

    # ---- /api/profile ----
    location /api/profile/ {
      # ✅ CORS headers
      if ($cors_origin != "") {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
        add_header Access-Control-Max-Age 86400 always;
      }

      # ✅ Preflight
      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass http://profile_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization; # JWT 전달
    }

    # ---- /api/echo ----
    location /api/echo/ {
      if ($cors_origin != "") {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
        add_header Access-Control-Max-Age 86400 always;
      }

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass http://echo_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization; # JWT 전달
    }
  }
}
