round:
  id: round-03
  title: search-grounding-and-short-contract
  hypothesis: '현재 SearXNG env가 들어간 상태에서 web_search 스모크 호출은 성공한다. round-02의 chart/internal-name
    개선은 유지하면서, 더 짧고 명령형인 계약으로 gemma의 empty/malformed 응답을 줄이고, gpt-oss/deepseek가 비어
    있지 않은 검색 결과를 최종 답변의 근거/출처로 실제 반영하는지 확인한다.

    '
  change_reason: 'round-02에서 gpt-oss는 전부 통과했고 deepseek는 DSML과 chart 문제가 크게 개선됐다. 하지만
    deepseek는 검색 결과가 비었거나 메타서치 쪽 한계가 있는 경우까지 점수상 실패로 보면 안 된다. gemma는 "확인해 보겠다"는 진행
    문장만 내고 검색을 호출하지 않거나 보고서 턴을 비웠다. 새 env 기준 도구 연결은 별도 스모크에서 확인됐으므로, round-03은 도구
    연결 실패가 아니라 검색 결과가 비어 있지 않을 때의 근거 사용 계약과 visible answer 안정성을 검증한다. 따라서 system prompt를
    짧게 줄이고, 최신성 질문의 검색 호출, 검색 결과가 있는 경우의 인용, 빈 응답 금지를 앞쪽 규칙으로 이동한다.

    '
  round_file: /home/coder/project/market-fit/backend/services/agent-service/harness-evals/rounds/round-03.yaml
control_variables:
  server_runtime:
    base_url: http://127.0.0.1:2024
    launch_env:
      DATABASE_URL: sqlite+aiosqlite:///harness-evals/.workdir/harness.db
      AUTO_CREATE_SCHEMA: 'true'
      FF_V2_EVENT_STREAMING: 'true'
      LANGGRAPH_DISABLE_FILE_PERSISTENCE: 'true'
    ff_v2_event_streaming: null
    auto_create_schema: null
    langgraph_disable_file_persistence: null
  conversation:
    name: market_report_control_v1
    description: 실제 사용자가 대충 말하는 상권 분석 대화를 통제변수로 고정한다.
    path: /home/coder/project/market-fit/backend/services/agent-service/harness-evals/control/conversation.yaml
    turns:
    - id: trend_probe
      prompt: 성수역 근처에 베이커리 카페를 내볼까 하는데 요즘 분위기 좀 봐줘.
      expectations:
        require_tool: web_search
        min_tool_calls: 1
        max_tool_calls: 4
        min_chart_blocks: null
        require_source_signal: true
        require_report_sections: false
        require_artifact_policy: false
        forbid_internal_type_names: false
    - id: commercial_report
      prompt: '그럼 창업 판단용으로 볼 수 있게 보고서처럼 정리해줘.

        숫자로 비교할 수 있는 건 차트로도 보이게 해주고.'
      expectations:
        require_tool: null
        min_tool_calls: null
        max_tool_calls: null
        min_chart_blocks: 1
        require_source_signal: false
        require_report_sections: true
        require_artifact_policy: false
        forbid_internal_type_names: true
    - id: artifact_policy
      prompt: '이 보고서랑 검색한 자료는 나중에 다시 보려면 각각 어떤 자료로 남기는 게 좋을지도 알려줘.

        너무 기술적인 말 말고 내가 이해하게 짧게 정리해줘.'
      expectations:
        require_tool: null
        min_tool_calls: null
        max_tool_calls: null
        min_chart_blocks: null
        require_source_signal: false
        require_report_sections: false
        require_artifact_policy: true
        forbid_internal_type_names: true
  repetitions: 3
  parallel_models: true
  turn_timeout_seconds: 180.0
  models:
  - name: gpt-oss
    model: gpt-oss:120b
    reasoning_effort: high
  - name: gemma
    model: gemma-4-31b-it
    reasoning_effort: high
  - name: deepseek
    model: deepseek-v4-flash
    reasoning_effort: high
independent_variables:
  harness_overrides:
    system_prompt: '당신은 상권·창업 판단을 돕는 Pickle AI 에이전트입니다. 한국어로, 실제 사용자가 바로 이해할 말로 답합니다.


      반드시 지킬 규칙:

      - 모든 턴은 사용자에게 보이는 일반 텍스트 답변을 남깁니다. 빈 답변으로 끝내지 않습니다.

      - "확인해볼게요", "검색해볼게요" 같은 진행 문장만 말하고 턴을 끝내지 않습니다.

      - 요즘, 최신, 최근, 현재, 분위기, 트렌드, 정책, 임대료, 상권 변화가 나오면 최종 답변 전에 검색 도구를 호출합니다.

      - 검색 결과가 비어 있거나 메타서치 오류/한계가 보이면 그 한계를 짧게 말하고, 확인된 맥락과 추정을 구분합니다.

      - 검색 결과가 1개 이상 있으면 답변 끝에 "근거/출처"를 만들고, 도구 결과에 있는 제목과 URL을 2개 이상 적습니다. URL이 없으면
      URL을 지어내지 말고 확인 한계로 적습니다.

      - 숫자, 매장명, 기관명, 통계는 검색 결과나 이미 확인된 대화 맥락에 있을 때만 확정적으로 말합니다. 추정이면 "추정"이라고 표시합니다.

      - 도구 DSL, DSML, XML 호출문, tool-call JSON을 사용자 답변에 쓰지 않습니다.

      - 내부 타입명이나 tool명을 사용자에게 쓰지 않습니다. 금지: commercial_report, search_report, research_report,
      markdown, code, artifact_create, document_create, web_search, web_fetch.

      - 저장 실행은 사용자가 저장/생성/남기기를 명시적으로 요청할 때만 합니다. 어떤 자료로 남길지 묻는 경우에는 도구를 호출하지 않고 설명만
      합니다.


      보고서 형식:

      - 핵심 판단 요약

      - 상권/입지 개요

      - 고객·수요

      - 경쟁·차별화

      - 비용·리스크

      - 실행 액션

      - 근거/출처와 확인 한계


      차트 형식:

      - 숫자 비교가 있으면 ```chart fenced block을 사용합니다.

      - chart block 안에는 JSON만 넣습니다.

      - bar/line: {"type":"bar","title":"제목","xKey":"label","series":[{"key":"value","label":"값"}],"data":[{"label":"A","value":1}]}

      - pie: {"type":"pie","title":"제목","nameKey":"label","dataKey":"value","data":[{"label":"A","value":1}]}


      자료로 남기는 법을 물으면:

      - 보고서 전체: "상권 분석 보고서"

      - 검색 링크와 요약: "검색 결과 정리"

      - 짧은 아이디어/체크리스트: "간단 노트"

      '
    tool_descriptions:
      web_search: '최신 웹 검색 도구입니다. 사용자 질문에 요즘, 최신, 최근, 현재, 분위기, 트렌드, 상권 변화, 임대료, 정책이
        있으면 반드시 호출합니다. 검색어는 지역+업종+기간을 포함합니다. 결과가 있으면 제목과 URL을 최종 답변 근거로 사용하고, 결과가
        비어 있으면 한계를 짧게 말합니다. URL을 지어내지 않습니다.

        '
      web_fetch: '검색 결과의 특정 URL 원문이 필요할 때만 호출합니다. 검색 결과에 URL이 없거나 원문 접근이 실패하면 실패를
        과장하지 말고 "원문 확인 한계"로 짧게 설명합니다. 이 도구 이름은 사용자에게 말하지 않습니다.

        '
      artifact_create: '사용자가 명시적으로 저장, 생성, 남기기를 요청했을 때만 사용합니다. 사용자에게는 "상권 분석 보고서",
        "검색 결과 정리", "간단 노트"라고 말하고 내부 enum/tool명은 말하지 않습니다. raw_text에는 유효한 마크다운과 chart
        JSON만 넣습니다.

        '
      document_create: '사용자가 여러 채팅에서 다시 볼 장기 보관 자료를 명시적으로 만들어 달라고 할 때만 사용합니다. 내부 document_type
        값은 tool argument로만 사용합니다.

        '
      onboarding_get_default_profile: '창업 성향, 취향, 온보딩 프로필을 사용자가 직접 묻거나 system_context에
        힌트가 있을 때만 사용합니다. 일반 상권 트렌드 질문에는 사용하지 않습니다.

        '
      onboarding_get_survey_result: '성향 분석 결과나 온보딩 설문 결과를 사용자가 직접 묻거나 system_context에
        힌트가 있을 때만 사용합니다.

        '
      onboarding_get_area_recommendations: '성향 결과 기반 지역 추천을 사용자가 요청하거나 system_context에
        연결된 성향 결과가 있을 때만 사용합니다.

        '
  allowed_tools:
  - web_search
  - web_fetch
  interrupt_on:
    web_search: false
    web_fetch: false
    artifact_get:
      allowed_decisions:
      - approve
      - reject
      - respond
    artifact_create:
      allowed_decisions:
      - approve
      - reject
      - respond
    artifact_update:
      allowed_decisions:
      - approve
      - reject
      - respond
    artifact_save_as_document:
      allowed_decisions:
      - approve
      - reject
      - respond
    document_search:
      allowed_decisions:
      - approve
      - reject
      - respond
    document_read:
      allowed_decisions:
      - approve
      - reject
      - respond
    document_create:
      allowed_decisions:
      - approve
      - reject
      - respond
    document_update:
      allowed_decisions:
      - approve
      - reject
      - respond
    document_delete:
      allowed_decisions:
      - approve
      - reject
      - respond
    memory_search:
      allowed_decisions:
      - approve
      - reject
      - respond
    memory_create:
      allowed_decisions:
      - approve
      - reject
      - respond
    memory_update:
      allowed_decisions:
      - approve
      - reject
      - respond
    memory_delete:
      allowed_decisions:
      - approve
      - reject
      - respond
  auto_resume:
    decision: respond
    message: 저장 작업은 지금 실행하지 말고, 필요한 본문과 저장 제안만 사용자에게 설명해 주세요.
