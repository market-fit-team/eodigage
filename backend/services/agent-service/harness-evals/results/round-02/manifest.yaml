round:
  id: round-02
  title: visible-answer-and-chart-contract
  hypothesis: 'round-01의 주요 실패였던 빈 content, DSML 노출, 무효 chart, 내부 타입명 노출, 저장 도구 조기
    호출을 시스템 프롬프트와 실제 tool description override만으로 줄일 수 있다.

    '
  change_reason: 'round-01 관측 결과 gemma는 모든 턴에서 visible content가 비었고, deepseek는 사용자
    답변에 DSML/tool-call markup을 노출했으며, gpt-oss는 내부 artifact/document enum과 tool명을 설명에
    그대로 썼다. 또한 모델들이 chart block을 만들더라도 프론트 chart schema와 맞지 않아 valid chart가 0개였다.
    production graph의 실제 system_context 렌더링은 유지하고, 하네스 override가 지원하는 system_prompt와
    tool_descriptions만 변경한다.

    '
  round_file: /home/coder/project/market-fit/backend/services/agent-service/harness-evals/rounds/round-02.yaml
control_variables:
  server_runtime:
    base_url: http://127.0.0.1:2024
    launch_env:
      DATABASE_URL: sqlite+aiosqlite:///harness-evals/.workdir/harness-clean-20260628-1358.db
      AUTO_CREATE_SCHEMA: 'true'
      FF_V2_EVENT_STREAMING: 'true'
