services:
  agent-db:
    image: postgres:17-alpine
    container_name: agent-up-db
    environment:
      POSTGRES_DB: agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    volumes:
      - agent_up_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks:
      - default
      - root-shared

  langgraph-api:
    # root compose와 같은 네트워크에 붙여 기존 MSA 서비스 DNS를 그대로 사용한다.
    env_file:
      - .env
    environment:
      FF_V2_EVENT_STREAMING: "true"
      JWKS_URL: http://authentik-server:9000/application/o/pickle-web/jwks/
      JWT_ISSUER: http://localhost:9000/application/o/pickle-web/
      JWT_AUDIENCE: pickle-web
      JWT_ALGORITHM: RS256
      DATABASE_URL: postgresql+asyncpg://agent:agent@agent-db:5432/agent
      AUTO_CREATE_SCHEMA: "true"
      AGENT_SERVER_INTERNAL_URL: http://127.0.0.1:8000
      ONBOARDING_SERVICE_URL: http://onboarding-service:8000
    depends_on:
      agent-db:
        condition: service_healthy
    networks:
      - default
      - root-shared
    labels:
      - traefik.enable=true
      - traefik.docker.network=${ROOT_COMPOSE_PROJECT_NAME}_default
      - traefik.http.routers.agent.rule=PathPrefix(`/api/agent`)
      - traefik.http.routers.agent.entrypoints=web
      - traefik.http.routers.agent.middlewares=agent-strip,api-cors
      - traefik.http.middlewares.agent-strip.stripprefix.prefixes=/api/agent
      - traefik.http.services.agent.loadbalancer.server.port=8000

volumes:
  agent_up_postgres_data:

networks:
  root-shared:
    external: true
    name: ${ROOT_COMPOSE_PROJECT_NAME}_default
