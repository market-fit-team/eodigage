# 의존성은 requirements.txt(런타임/공용)와 requirements-dev.txt(도구)에서 단일 관리한다.
# 이 파일은 ruff 설정만 둔다(패키지 빌드/설치는 하지 않음).
[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [".venv", ".artifacts"]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort(import 정렬), UP: pyupgrade, B: bugbear
select = ["E", "W", "F", "I", "UP", "B"]
