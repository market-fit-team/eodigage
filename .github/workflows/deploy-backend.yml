name: deploy-backend

on:
  # GitHub Actions 화면에서 수동 실행만 허용한다.
  workflow_dispatch:
    inputs:
      # 기본은 main이며, 필요 시 다른 브랜치도 배포할 수 있다.
      branch:
        description: 배포할 브랜치명
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  deploy-backend:
    # dump 복원과 온보딩 학습 없이 백엔드 서비스만 올리는 배포다.
    uses: ./.github/workflows/_deploy-runner-common.yml
    with:
      workflow_label: deploy-backend
      branch: ${{ inputs.branch }}
      copy_dumps: false
      copy_trend_assets: true
      install_trend_refresh_cron: true
      # gateway + data + backend services만 기동한다.
      deploy_command: make gateway data services
