name: deploy-frontend-init

on:
  # GitHub Actions 화면에서 수동 실행만 허용한다.
  workflow_dispatch:
    inputs:
      # 기본은 main이며, 필요 시 다른 브랜치도 배포할 수 있다.
      branch:
        description: 배포할 브랜치명
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  deploy-frontend-init:
    # 백엔드/DB는 건드리지 않고 frontend standalone만 초기화해서 다시 올린다.
    uses: ./.github/workflows/_deploy-runner-common.yml
    with:
      workflow_label: deploy-frontend-init
      branch: ${{ inputs.branch }}
      copy_dumps: false
      copy_trend_assets: false
      # reset-frontend는 frontend 컨테이너와 익명 볼륨만 제거한다.
      # NO_CACHE=1은 VPS 전역 build cache를 삭제하지 않고 이번 배포 빌드에서만 cache 재사용을 막는다.
      deploy_command: NO_CACHE=1 make reset-frontend frontend
