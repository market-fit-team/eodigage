name: Codex Code Review

# PR 댓글에 /code-review가 달렸을 때 실행
on:
  issue_comment:
    types: [created]

# 코드 읽기, PR 정보 조회, PR 댓글 작성/수정에 필요한 권한
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  code-review:
    # PR 댓글이고, 댓글 내용이 /code-review로 시작할 때만 실행
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/code-review') }}

    # VPS에 등록한 self-hosted runner에서 실행
    runs-on: [self-hosted, Linux, ARM64]

    steps:
      # PR 번호와 base 브랜치 정보를 가져옴
      - name: PR 정보 가져오기
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(prNumber));
            core.setOutput('base_ref', pr.base.ref);

      # 리뷰 시작을 PR 댓글로 알리고, 나중에 같은 댓글을 수정하기 위해 댓글 ID 저장
      - name: 리뷰 시작 댓글 작성
        id: start-comment
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                '## Codex 코드 리뷰 진행 중',
                '',
                'gpt-5.4 xhigh로 머지될 변경사항만 리뷰하고 있습니다.',
                '',
                `- PR: #${context.payload.issue.number}`,
                `- 실행 ID: ${context.runId}`,
                `- 실행 로그: [GitHub Actions에서 보기](${runUrl})`,
              ].join('\n'),
            });

            core.setOutput('comment_id', String(comment.id));

      # code-server 컨테이너 안의 market-fit 폴더에서 PR 브랜치로 이동해서 Codex 리뷰 실행
      - name: code-server 안에서 Codex 리뷰 실행
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          REVIEW_FILE="$RUNNER_TEMP/codex-review-${PR_NUMBER}.md"
          CONTAINER_REVIEW_FILE="/tmp/codex-review-${PR_NUMBER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.md"
          REVIEW_BRANCH="codex-review/pr-${PR_NUMBER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          echo "REVIEW_FILE=$REVIEW_FILE" >> "$GITHUB_ENV"

          set +e

          docker compose \
            -f /home/ubuntu/code-server/docker-compose.opencode.yml \
            -f /home/ubuntu/code-server/docker-compose.yml \
            exec -T \
            -e GH_TOKEN="$GH_TOKEN" \
            -e PR_NUMBER="$PR_NUMBER" \
            -e BASE_REF="$BASE_REF" \
            -e REVIEW_BRANCH="$REVIEW_BRANCH" \
            -e GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            -e GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            -e CONTAINER_REVIEW_FILE="$CONTAINER_REVIEW_FILE" \
            code-server sh -lc '
              set -eu

              cd /home/coder/project/market-fit

              # 원래 브랜치 또는 커밋 위치 저장
              ORIG_REF="$(git symbolic-ref --quiet --short HEAD || git rev-parse HEAD)"

              # 기존 작업 변경사항을 stash 했는지 기록
              STASH_CREATED=0

              # 작업 종료 시 원래 상태로 복구
              cleanup() {
                git checkout "$ORIG_REF" >/dev/null 2>&1 || true

                if [ "$STASH_CREATED" = "1" ]; then
                  git stash pop || true
                fi

                git branch -D "$REVIEW_BRANCH" >/dev/null 2>&1 || true
              }

              trap cleanup EXIT

              # 기존 변경사항이 있으면 안전하게 stash
              if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
                git stash push -u -m "codex-review-${PR_NUMBER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >/dev/null
                STASH_CREATED=1
              fi

              # 이전 임시 브랜치가 혹시 남아 있으면 삭제
              git branch -D "$REVIEW_BRANCH" >/dev/null 2>&1 || true

              # base 브랜치 최신 상태 가져오기
              git fetch "https://x-access-token:${GH_TOKEN}@github.com/market-fit-team/market-fit.git" \
                "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

              # PR 브랜치를 임시 로컬 브랜치로 가져오기
              git fetch "https://x-access-token:${GH_TOKEN}@github.com/market-fit-team/market-fit.git" \
                "pull/${PR_NUMBER}/head:${REVIEW_BRANCH}"

              # PR 브랜치로 이동
              git checkout "$REVIEW_BRANCH"

              # 머지될 변경사항만 Codex로 리뷰하고, 최종 답변만 파일로 저장
              /home/coder/.config/nvm/versions/node/v24.15.0/bin/codex exec \
                --sandbox danger-full-access \
                --ephemeral \
                --color never \
                --output-last-message "$CONTAINER_REVIEW_FILE" \
                --model gpt-5.4 \
                -c model_reasoning_effort=xhigh \
                "origin/${BASE_REF}...HEAD 범위의 머지될 변경사항만 코드리뷰해줘. 변경사항 밖의 코드는 맥락 확인용으로만 참고해. 보안 문제, 버그, 회귀 위험, 테스트 누락을 우선순위로 보고 한국어로 작성해. 빌드나 실행은 하지 말고 코드만 보고 리뷰해. 코드 리뷰보다 앞에 # PR 도 남겨놔. PR은 feat:적절한 제목 등과 함께 전체 변경사항이 뭐였는지 꼼꼼히 남겨놓고 다정하고 착한 문체로 이모지도 엄청 많이 넣어."
            '

          CODEX_EXIT=$?

          set -e

          # 컨테이너 안에 저장된 Codex 최종 리뷰 결과를 runner 쪽 파일로 가져옴
          if docker compose \
            -f /home/ubuntu/code-server/docker-compose.opencode.yml \
            -f /home/ubuntu/code-server/docker-compose.yml \
            exec -T code-server sh -lc "test -s '$CONTAINER_REVIEW_FILE'"; then

            docker compose \
              -f /home/ubuntu/code-server/docker-compose.opencode.yml \
              -f /home/ubuntu/code-server/docker-compose.yml \
              exec -T code-server sh -lc "cat '$CONTAINER_REVIEW_FILE'" > "$REVIEW_FILE"
          else
            cat > "$REVIEW_FILE" <<'EOF'
          Codex 코드 리뷰에 실패했습니다.

          확인할 것:
          - Codex 인증 상태
          - code-server 컨테이너 안 Codex 실행 가능 여부
          - PR 브랜치 fetch 가능 여부
          - GitHub Actions 권한
          - Codex 실행 로그
          EOF
          fi

          echo "CODEX_EXIT=$CODEX_EXIT" >> "$GITHUB_ENV"

      # Codex 리뷰 결과를 처음 작성한 진행 중 댓글에 반영
      - name: PR에 리뷰 결과 반영
        if: always()
        uses: actions/github-script@v8
        env:
          REVIEW_FILE: ${{ env.REVIEW_FILE }}
          START_COMMENT_ID: ${{ steps.start-comment.outputs.comment_id }}
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let review = 'Codex 리뷰 결과 파일을 읽지 못했습니다.';
            if (process.env.REVIEW_FILE && fs.existsSync(process.env.REVIEW_FILE)) {
              review = fs.readFileSync(process.env.REVIEW_FILE, 'utf8').trim();
            }

            if (!review) {
              review = 'Codex가 빈 리뷰 결과를 반환했습니다.';
            }

            let body = [
              '## Codex 코드 리뷰 완료',
              '',
              `- 실행 로그: [GitHub Actions에서 보기](${runUrl})`,
              '',
              review,
            ].join('\n');

            const MAX_COMMENT_LENGTH = 60000;

            if (body.length <= MAX_COMMENT_LENGTH) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: Number(process.env.START_COMMENT_ID),
                body,
              });
            } else {
              const header = [
                '## Codex 코드 리뷰 완료',
                '',
                `- 실행 로그: [GitHub Actions에서 보기](${runUrl})`,
                '- 리뷰가 길어 여러 댓글로 나누어 게시합니다.',
                '',
              ].join('\n');

              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: Number(process.env.START_COMMENT_ID),
                body: header,
              });

              const chunks = [];
              for (let i = 0; i < review.length; i += MAX_COMMENT_LENGTH) {
                chunks.push(review.slice(i, i + MAX_COMMENT_LENGTH));
              }

              for (let i = 0; i < chunks.length; i++) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: [
                    `## Codex 코드 리뷰 ${i + 1}/${chunks.length}`,
                    '',
                    chunks[i],
                  ].join('\n'),
                });
              }
            }

      # Codex 실행이 실패했으면 댓글 작성 후 workflow도 실패 처리
      - name: Codex 실패 처리
        if: ${{ env.CODEX_EXIT != '0' }}
        run: exit 1