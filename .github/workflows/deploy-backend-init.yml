name: deploy-backend-init

on:
  # GitHub Actions 화면에서 수동 실행만 허용한다.
  workflow_dispatch:
    inputs:
      # 기본은 main이며, 필요 시 다른 브랜치도 배포할 수 있다.
      branch:
        description: 배포할 브랜치명
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  deploy-backend-init:
    # 초기 서버 세팅이나 전체 재기동처럼 dump 복원과 모델 후처리까지 모두 수행하는 배포다.
    uses: ./.github/workflows/_deploy-runner-common.yml
    with:
      workflow_label: deploy-backend-init
      branch: ${{ inputs.branch }}
      copy_dumps: true
      copy_trend_assets: true
      install_trend_refresh_cron: true
      # reset-backend는 frontend를 남기고 backend 컨테이너, compose 볼륨, 로컬 backend 이미지를 먼저 제거한다.
      # make up은 gateway -> data -> restore-db -> services -> train-models 순서를 모두 수행한다.
      # train-models는 온보딩 학습과 trend 배치를 함께 실행한다.
      # NO_CACHE=1은 VPS 전역 build cache를 삭제하지 않고 이번 배포 빌드에서만 cache 재사용을 막는다.
      deploy_command: NO_CACHE=1 make reset-backend up
