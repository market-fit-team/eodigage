name: Deploy Runner Common

on:
  workflow_call:
    inputs:
      # GitHub Actions 화면과 로그에 표시할 워크플로 식별자다.
      workflow_label:
        required: true
        type: string
      # self-hosted runner가 clone 또는 fetch할 브랜치명이다.
      branch:
        required: true
        type: string
      # market / franchise dump가 배포용 clone 디렉터리에 있는지 확인할지 결정한다.
      copy_dumps:
        required: false
        type: boolean
        default: false
      # trend-service .artifacts / .raw가 배포용 clone 디렉터리에 있는지 확인할지 결정한다.
      copy_trend_assets:
        required: false
        type: boolean
        default: false
      # 백엔드 배포 후 trend-service 주기 갱신 cron을 설치할지 결정한다.
      install_trend_refresh_cron:
        required: false
        type: boolean
        default: false
      # 실제 배포 단계에서 실행할 명령이다.
      deploy_command:
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    # VPS에 연결된 self-hosted ARM64 runner에서만 실행한다.
    runs-on: [self-hosted, Linux, ARM64]
    concurrency:
      # 같은 서버에 동시에 여러 배포가 겹치지 않도록 직렬화한다.
      group: market-fit-deploy
      cancel-in-progress: false
    env:
      # 원격 저장소 주소다. 매 실행마다 최신 브랜치를 depth 1로 맞춘다.
      REPO_URL: https://github.com/market-fit-team/market-fit.git
      REPO_REF: ${{ inputs.branch }}
      # 실제 배포를 수행할 별도 clone 작업 디렉터리다.
      TARGET_REPO_DIR: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy
      # 배포에 필요한 ignored 로컬 자산은 배포용 clone 디렉터리 안에 두고 Git 갱신이 건드리지 않는다.
      TARGET_ENV_FILE: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/deploy/.env
      TARGET_DUMP_DIR: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/deploy/.local/backend-db-market-franchise
      TARGET_POST_DUMP_DIR: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/deploy/.local/post-db
      TARGET_ONBOARDING_RAW_DIR: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/backend/services/onboarding-service/.raw
      TARGET_TREND_ARTIFACTS_DIR: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/backend/services/trend-service/.artifacts
      TARGET_TREND_RAW_DIR: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/backend/services/trend-service/.raw
    steps:
      # 어떤 워크플로가 어떤 브랜치로 실행되는지 먼저 로그에 남긴다.
      - name: 배포 시작 정보 출력
        run: |
          echo "workflow=${{ inputs.workflow_label }}"
          echo "branch=${REPO_REF}"
          echo "target=${TARGET_REPO_DIR}"

      # 배포용 작업 디렉터리를 최신 브랜치 기준으로 depth 1 clone/fetch 상태로 맞춘다.
      # 기존 로컬 작업 저장소를 직접 건드리지 않고, 별도 clone 디렉터리만 갱신한다.
      - name: 배포 저장소 최신화
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -d "$TARGET_REPO_DIR/.git" ]; then
            git -C "$TARGET_REPO_DIR" remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/market-fit-team/market-fit.git"
            # ignored 운영 자산은 그대로 두고 tracked/untracked 작업 트리만 배포 브랜치에 맞춘다.
            git -C "$TARGET_REPO_DIR" reset --hard HEAD
            git -C "$TARGET_REPO_DIR" clean -fd
            git -C "$TARGET_REPO_DIR" fetch --depth 1 origin "$REPO_REF"
            git -C "$TARGET_REPO_DIR" checkout -B "$REPO_REF" FETCH_HEAD
            git -C "$TARGET_REPO_DIR" reset --hard FETCH_HEAD
            git -C "$TARGET_REPO_DIR" clean -fd
          elif [ -e "$TARGET_REPO_DIR" ]; then
            echo "::error::배포 대상 경로가 Git 저장소가 아닙니다: $TARGET_REPO_DIR"
            echo "::error::운영 자산 보호를 위해 자동 삭제나 재클론을 수행하지 않습니다."
            exit 1
          else
            git clone --depth 1 --branch "$REPO_REF" "https://x-access-token:${GH_TOKEN}@github.com/market-fit-team/market-fit.git" "$TARGET_REPO_DIR"
          fi

          git -C "$TARGET_REPO_DIR" rev-parse HEAD

      # 배포용 비밀값은 배포 clone 디렉터리의 로컬 deploy/.env 하나만 사용한다.
      - name: 배포용 env 파일 확인
        run: |
          set -euo pipefail

          if [ ! -f "$TARGET_ENV_FILE" ]; then
            echo "::error::배포 env 파일이 없습니다: $TARGET_ENV_FILE"
            echo "::error::이 워크플로는 repository root .env가 아니라 deploy/.env만 사용합니다."
            if [ -f "$TARGET_REPO_DIR/.env" ]; then
              echo "::error::root .env는 존재하지만 배포에는 사용되지 않습니다. 값을 deploy/.env로 옮겨 주세요."
            fi
            exit 1
          fi

      # placeholder가 authentik blueprint나 DB 비밀번호로 적용되면 SQL 수동 수정도 다음 배포 때 다시 덮인다.
      - name: 배포용 env 값 검증
        run: |
          set -euo pipefail

          bash "$TARGET_REPO_DIR/deploy/scripts/validate-deploy-env.sh" "$TARGET_ENV_FILE"

      # dump가 필요한 워크플로만 배포 clone 디렉터리의 로컬 dump 존재를 확인한다.
      - name: 덤프 파일 확인
        if: ${{ inputs.copy_dumps }}
        run: |
          set -euo pipefail

          test -f "$TARGET_DUMP_DIR/market.dump"
          test -f "$TARGET_DUMP_DIR/franchise.dump"
          test -f "$TARGET_POST_DUMP_DIR/post.dump"

      # trend-service가 읽는 운영 아티팩트와 선택 raw CSV는 배포 clone 디렉터리 로컬 자산을 그대로 사용한다.
      - name: trend 자산 확인
        if: ${{ inputs.copy_trend_assets }}
        run: |
          set -euo pipefail

          test -d "$TARGET_TREND_ARTIFACTS_DIR"
          mkdir -p "$TARGET_TREND_RAW_DIR"

      # raw 모드 학습을 쓰는 경우 onboarding-service 원본 CSV가 로컬 clone 디렉터리에 있어야 한다.
      - name: onboarding raw 자산 확인
        run: |
          set -euo pipefail

          set -a
          # shellcheck disable=SC1090
          source "$TARGET_ENV_FILE"
          set +a

          if [[ "${ONBOARDING_CATEGORY_DATA_MODE:-sample}" == "raw" ]]; then
            test -d "$TARGET_ONBOARDING_RAW_DIR"
            find "$TARGET_ONBOARDING_RAW_DIR" -maxdepth 1 -type f -name '*.csv' | grep -q .
          fi

      # 개별 워크플로가 넘긴 make 또는 docker compose 명령을 deploy 디렉터리에서 실행한다.
      - name: 배포 명령 실행
        working-directory: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/deploy
        run: |
          set -euo pipefail
          ${{ inputs.deploy_command }}

      # 배포용 clone 경로 기준으로 trend-service 자동 갱신 cron을 중복 없이 설치한다.
      - name: trend 자동 갱신 cron 설치
        if: ${{ inputs.install_trend_refresh_cron }}
        working-directory: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/deploy
        run: |
          set -euo pipefail
          make install-trend-refresh-cron

      # 마지막으로 현재 compose 상태를 출력해 배포 결과를 빠르게 확인한다.
      - name: 배포 상태 확인
        working-directory: /home/ubuntu/code-server/volumes/home/project/market-fit-deploy/deploy
        run: |
          set -euo pipefail
          docker compose --env-file .env -f compose/backend-public-stack.yml ps
