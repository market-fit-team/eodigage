services:
  db:
    image: postgres:17-alpine # 필요하면 17-alpine 등으로 올려도 됨
    container_name: frontend-db
    restart: unless-stopped
    ports:
      - "5662:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frontend_db
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frontend_db"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
